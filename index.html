<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tamponmania</title>
<style>
* { box-sizing: border-box; }
body { font-family: 'Segoe UI', Arial, sans-serif; text-align: center; margin: 0;
  background: linear-gradient(135deg, #ffe0e9 0%, #fff5f8 40%, #fce4ec 100%);
  background-attachment: fixed; min-height: 100vh; overflow-x: hidden; }

/* animated floating hearts/drops in the background */
#bgFx { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
.bgFloat { position: absolute; bottom: -40px; font-size: 1.6em; opacity: 0.35; animation: rise linear infinite; }
@keyframes rise {
  0%   { transform: translateY(0) rotate(0deg); opacity: 0; }
  10%  { opacity: 0.4; }
  90%  { opacity: 0.4; }
  100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
}

h1 {
  color: #ad1457; font-size: 2.8em; letter-spacing: 1px; margin: 18px 0 4px;
  background: linear-gradient(90deg, #ec407a, #c2185b, #8e24aa, #ec407a);
  background-size: 300% 100%;
  -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
  filter: drop-shadow(2px 2px 4px rgba(173,20,87,0.25));
  animation: shine 5s linear infinite;
  position: relative; z-index: 1;
}
@keyframes shine { to { background-position: 300% 0; } }

#loadingScreen {
  position: fixed; top:0; left:0; width:100%; height:100%;
  background: radial-gradient(circle at 50% 30%, #e91e63, #ad1457 70%, #880e4f);
  color: white; display: flex; flex-direction: column;
  align-items: center; justify-content: center; z-index: 999;
  transition: opacity 0.5s ease;
}
#loadingScreen h2 { font-size: 2em; text-shadow: 0 2px 6px rgba(0,0,0,0.3); }
#loadingBarOuter { width: 300px; height: 25px; background: rgba(255,255,255,0.25); border-radius: 15px; overflow: hidden; margin-top: 20px; box-shadow: inset 0 2px 6px rgba(0,0,0,0.2); }
#loadingBarInner { width: 0%; height: 100%; background: linear-gradient(90deg,#fff,#ffd6e7); transition: width 0.2s; box-shadow: 0 0 12px rgba(255,255,255,0.8); }
.loadingIcon { font-size: 5em; animation: spin 1.2s linear infinite; }
@keyframes spin { from { transform: rotate(0deg);} to { transform: rotate(360deg);} }

#game { display: none; position: relative; z-index: 1; padding-bottom: 40px; }

/* stat panel */
#statBar {
  display: inline-flex; gap: 26px; align-items: center; justify-content: center;
  background: rgba(255,255,255,0.55); backdrop-filter: blur(6px);
  border: 2px solid #f8bbd0; border-radius: 20px; padding: 12px 28px; margin: 6px auto 4px;
  box-shadow: 0 6px 18px rgba(236,64,122,0.2);
}
#count {
  font-size: 2.4em; font-weight: bold; color: #ad1457;
  text-shadow: 1px 1px 3px rgba(173,20,87,0.25);
}
.statLabel { font-size: 0.75em; color: #b06; letter-spacing: 1px; text-transform: uppercase; display:block; }
#cps, #comboBox { color: #8e5a70; font-size: 1.15em; font-weight: bold; }
#comboBox { color: #d81b60; transition: transform 0.1s; }
#comboBox.pop { transform: scale(1.4); }

/* click area */
#clickWrap { position: relative; width: 300px; height: 380px; margin: 10px auto 0; }
#clickBtn { cursor: pointer; user-select: none; display: inline-block; width: 220px; height: 320px;
  position: absolute; left: 50%; top: 20px; transform: translateX(-50%);
  transition: transform 0.08s; animation: float 2s ease-in-out infinite; filter: drop-shadow(0 12px 8px rgba(0,0,0,0.3)); }
#clickBtn:active { transform: translateX(-50%) scale(0.9); }
#clickBtn:hover { transform: translateX(-50%) scale(1.05); }
#clickBtn.punch { animation: punch 0.25s ease; }
@keyframes punch { 0%{transform:translateX(-50%) scale(1);} 40%{transform:translateX(-50%) scale(0.85);} 100%{transform:translateX(-50%) scale(1);} }

@keyframes float {
  0%, 100% { transform: translateX(-50%) translateY(0px); }
  50% { transform: translateX(-50%) translateY(-15px); }
}

.tampon-body {
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 95px;
  height: 220px;
  background: linear-gradient(90deg,
    #d4c3ae 0%, #e8dcc8 8%, #f7f0e3 25%, #fffcf5 50%,
    #f7f0e3 75%, #e8dcc8 92%, #d4c3ae 100%);
  border-radius: 48px 48px 20px 20px;
  box-shadow:
    inset -16px 0 22px rgba(120,90,60,0.18),
    inset 8px 0 12px rgba(255,255,255,0.7),
    inset 0 -8px 10px rgba(120,90,60,0.12),
    0 10px 14px rgba(0,0,0,0.2);
  transition: background 0.3s, box-shadow 0.3s;
}

.tampon-body::before {
  content: '';
  position: absolute;
  top: 8px;
  left: 6px;
  right: 6px;
  bottom: 10px;
  border-radius: 42px 42px 16px 16px;
  background-image:
    repeating-linear-gradient(0deg, rgba(120,90,60,0.05) 0px, rgba(120,90,60,0.05) 1.5px, transparent 1.5px, transparent 5px),
    repeating-linear-gradient(90deg, rgba(120,90,60,0.03) 0px, rgba(120,90,60,0.03) 1px, transparent 1px, transparent 8px);
}

.tampon-body::after {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 14px;
  background: linear-gradient(180deg, rgba(120,90,60,0.15), transparent);
  border-radius: 48px 48px 0 0;
}

.tampon-string {
  position: absolute;
  bottom: -38px;
  left: 50%;
  transform: translateX(-50%);
  width: 2.5px;
  height: 48px;
  background: linear-gradient(180deg, #f0e8d8, #c9bda3);
  border-radius: 1.5px;
  animation: wiggle 1.3s ease-in-out infinite;
  transform-origin: top center;
}

.tampon-string::before {
  content: '';
  position: absolute;
  top: 0;
  left: -1px;
  width: 4.5px;
  height: 48px;
  background: repeating-linear-gradient(180deg, transparent 0px, transparent 3px, rgba(120,90,60,0.2) 3px, rgba(120,90,60,0.2) 4px);
}

.tampon-string::after {
  content: '';
  position: absolute;
  bottom: -7px;
  left: 50%;
  transform: translateX(-50%);
  width: 10px;
  height: 10px;
  background: radial-gradient(circle at 35% 35%, #f5ecd9, #cbbc9d);
  border-radius: 50%;
  box-shadow: inset -2px -2px 3px rgba(120,90,60,0.3);
}

@keyframes wiggle {
  0%, 100% { transform: translateX(-50%) rotate(-5deg); }
  50% { transform: translateX(-50%) rotate(5deg); }
}

.tampon-blood {
  position: absolute;
  top: -4px;
  left: 60%;
  transform: translateX(-50%);
  font-size: 2em;
  filter: drop-shadow(0 3px 4px rgba(120,0,0,0.5)) saturate(1.3);
  animation: drip 1.6s ease-in-out infinite;
}

@keyframes drip {
  0%, 100% { transform: translateX(-50%) translateY(0) scale(1); opacity: 1; }
  50% { transform: translateX(-50%) translateY(5px) scale(1.08); opacity: 0.9; }
}

/* ============ SKINS ============ */
/* Rot / Blut */
#clickBtn.skin-red .tampon-body {
  background: linear-gradient(90deg,#7a0000 0%,#a30d0d 8%,#d32f2f 25%,#ff5252 50%,#d32f2f 75%,#a30d0d 92%,#7a0000 100%);
  box-shadow: inset -16px 0 22px rgba(80,0,0,0.4), inset 8px 0 12px rgba(255,180,180,0.6),
    inset 0 -8px 10px rgba(80,0,0,0.3), 0 10px 14px rgba(120,0,0,0.4), 0 0 22px rgba(211,47,47,0.5);
}
/* Gold */
#clickBtn.skin-gold .tampon-body {
  background: linear-gradient(90deg,#8a6d00 0%,#c9a227 8%,#ffd700 25%,#fff6c0 50%,#ffd700 75%,#c9a227 92%,#8a6d00 100%);
  box-shadow: inset -16px 0 22px rgba(120,90,0,0.35), inset 8px 0 12px rgba(255,255,200,0.8),
    inset 0 -8px 10px rgba(120,90,0,0.25), 0 10px 14px rgba(0,0,0,0.25), 0 0 26px rgba(255,215,0,0.6);
}
/* Neon */
#clickBtn.skin-neon .tampon-body {
  background: linear-gradient(90deg,#00332e 0%,#00b3a4 20%,#39ff14 50%,#00b3a4 80%,#00332e 100%);
  box-shadow: inset -14px 0 20px rgba(0,60,50,0.5), inset 8px 0 12px rgba(180,255,200,0.6),
    0 0 30px rgba(57,255,20,0.7), 0 0 60px rgba(0,229,255,0.4);
}
/* Diamant / Eis */
#clickBtn.skin-diamond .tampon-body {
  background: linear-gradient(115deg,#a8e6ff 0%,#e3f7ff 30%,#ffffff 50%,#bfeaff 70%,#7fd4ff 100%);
  box-shadow: inset -14px 0 20px rgba(80,160,220,0.35), inset 10px 0 14px rgba(255,255,255,0.95),
    0 10px 14px rgba(0,80,160,0.25), 0 0 26px rgba(120,200,255,0.7);
}
/* Galaxie */
#clickBtn.skin-galaxy .tampon-body {
  background:
    radial-gradient(circle at 30% 20%, #fff 0.5px, transparent 1.5px),
    radial-gradient(circle at 70% 60%, #fff 0.5px, transparent 1.5px),
    radial-gradient(circle at 45% 80%, #fff 0.5px, transparent 1.5px),
    linear-gradient(120deg,#1a0033 0%,#4a148c 30%,#7b1fa2 50%,#311b92 75%,#1a0033 100%);
  box-shadow: inset -14px 0 22px rgba(10,0,40,0.6), inset 10px 0 14px rgba(200,150,255,0.4),
    0 10px 14px rgba(0,0,0,0.4), 0 0 30px rgba(123,31,162,0.7);
}
/* Regenbogen (animiert) */
#clickBtn.skin-rainbow .tampon-body {
  background: linear-gradient(90deg,#ff004c,#ff8a00,#ffe600,#00e676,#00b0ff,#d500f9,#ff004c);
  background-size: 400% 100%;
  animation: rainbowFlow 3s linear infinite;
  box-shadow: inset 0 -8px 10px rgba(0,0,0,0.15), 0 10px 14px rgba(0,0,0,0.25), 0 0 30px rgba(255,255,255,0.5);
}
@keyframes rainbowFlow { to { background-position: 400% 0; } }
/* dim the cotton texture on colored skins so the color pops */
#clickBtn:not(.skin-classic) .tampon-body::before { opacity: 0.35; }

/* ============ SHOP ============ */
.shop { margin-top: 30px; padding: 0; }
.shop h2 { color: #6a1b9a; text-shadow: 1px 1px 2px rgba(106,27,154,0.2); font-size: 1.6em; margin-bottom: 2px; }
.scrollHint { color: #b06; font-size: 0.85em; margin: 0 0 4px; opacity: 0.75; }

/* horizontal scroller: all upgrades on one swipeable row */
.item-row {
  display: flex; flex-wrap: nowrap; overflow-x: auto; overflow-y: hidden;
  gap: 14px; padding: 12px 22px 20px; margin: 0;
  scroll-snap-type: x proximity; -webkit-overflow-scrolling: touch;
  scrollbar-width: thin; scrollbar-color: #ec407a rgba(248,187,208,0.4);
}
.item-row .item { flex: 0 0 210px; margin: 0; scroll-snap-align: center; }
.item-row::-webkit-scrollbar { height: 10px; }
.item-row::-webkit-scrollbar-track { background: rgba(248,187,208,0.35); border-radius: 10px; }
.item-row::-webkit-scrollbar-thumb { background: linear-gradient(90deg,#ec407a,#c2185b); border-radius: 10px; }

.item {
  display: inline-block; margin: 10px; padding: 18px; border-radius: 16px;
  background: linear-gradient(145deg, #ffffff, #fff0f5);
  width: 220px; vertical-align: top;
  box-shadow: 0 4px 10px rgba(236,64,122,0.2), inset 0 0 0 2px #f8bbd0;
  transition: transform 0.2s, box-shadow 0.2s;
}
.item:hover { transform: translateY(-4px); box-shadow: 0 8px 16px rgba(236,64,122,0.3), inset 0 0 0 2px #ec407a; }
.item.special {
  background: linear-gradient(145deg, #ffffff, #f3e5f5);
  box-shadow: 0 4px 10px rgba(106,27,154,0.25), inset 0 0 0 2px #ce93d8;
}
.item.special:hover { box-shadow: 0 8px 16px rgba(106,27,154,0.35), inset 0 0 0 2px #6a1b9a; }
.item strong { color: #ad1457; font-size: 1.1em; }
.item.special strong { color: #6a1b9a; }
.item button {
  background: linear-gradient(145deg, #ec407a, #c2185b); color: white; border: none;
  padding: 9px 14px; border-radius: 10px; cursor: pointer; font-weight: bold;
  box-shadow: 0 3px 6px rgba(194,24,91,0.4); margin-top: 6px;
}
.item button:hover:not(:disabled) { filter: brightness(1.1); }
.item.special button { background: linear-gradient(145deg, #8e24aa, #6a1b9a); box-shadow: 0 3px 6px rgba(106,27,154,0.4); }
.item button:disabled { background: #ddd; box-shadow: none; cursor: not-allowed; color: #999; }
.owned-badge { color: #2e7d32; font-weight: bold; background: #e8f5e9; padding: 4px 10px; border-radius: 8px; display: inline-block; }

/* skin shop */
.item.skin { background: linear-gradient(145deg,#ffffff,#e8f5ff); box-shadow: 0 4px 10px rgba(3,155,229,0.22), inset 0 0 0 2px #90caf9; }
.item.skin:hover { box-shadow: 0 8px 16px rgba(3,155,229,0.32), inset 0 0 0 2px #1e88e5; }
.item.skin strong { color: #1565c0; }
.item.skin button { background: linear-gradient(145deg,#42a5f5,#1565c0); box-shadow: 0 3px 6px rgba(21,101,192,0.4); }
.skinPreview {
  width: 70px; height: 100px; margin: 6px auto 8px; border-radius: 30px 30px 12px 12px;
  box-shadow: inset -8px 0 12px rgba(0,0,0,0.15), inset 6px 0 8px rgba(255,255,255,0.5), 0 4px 8px rgba(0,0,0,0.2);
}
.item.skin.active { outline: 3px solid #1e88e5; outline-offset: 2px; }
.active-badge { color: #1565c0; font-weight: bold; background: #e3f2fd; padding: 4px 10px; border-radius: 8px; display:inline-block; }

/* floating click numbers */
.floatNum {
  position: absolute; pointer-events: none; font-weight: bold; font-size: 1.3em;
  color: #c2185b; text-shadow: 0 1px 3px rgba(255,255,255,0.9); z-index: 5;
  animation: floatUp 0.9s ease-out forwards;
}
.floatNum.crit { color: #ff1744; font-size: 2em; text-shadow: 0 0 8px rgba(255,23,68,0.7); }
@keyframes floatUp {
  0% { transform: translate(-50%, 0) scale(0.6); opacity: 0; }
  25% { opacity: 1; transform: translate(-50%, -12px) scale(1.15); }
  100% { transform: translate(-50%, -90px) scale(1); opacity: 0; }
}

/* particle bits */
.particle { position: absolute; pointer-events: none; font-size: 1.1em; z-index: 4; animation: burst 0.7s ease-out forwards; }
@keyframes burst {
  0% { transform: translate(-50%,-50%) scale(0.4); opacity: 1; }
  100% { transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(1) rotate(var(--rot)); opacity: 0; }
}

/* crit screen flash */
#critFlash { position: fixed; inset: 0; background: radial-gradient(circle, rgba(255,23,68,0.35), transparent 70%);
  pointer-events: none; opacity: 0; z-index: 900; }
#critFlash.on { animation: flash 0.4s ease-out; }
@keyframes flash { 0%{opacity:1;} 100%{opacity:0;} }
body.shake { animation: shake 0.3s; }
@keyframes shake { 0%,100%{transform:translate(0,0);} 25%{transform:translate(-6px,3px);} 50%{transform:translate(6px,-3px);} 75%{transform:translate(-4px,-2px);} }

/* toast for milestones */
#toast { position: fixed; top: 80px; left: 50%; transform: translateX(-50%) translateY(-30px);
  background: linear-gradient(145deg,#8e24aa,#6a1b9a); color: #fff; padding: 12px 22px; border-radius: 14px;
  font-weight: bold; box-shadow: 0 6px 18px rgba(0,0,0,0.3); z-index: 1001; opacity: 0; transition: all 0.4s; pointer-events: none; }
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

#musicToggle {
  position: fixed; top: 15px; right: 15px;
  background: #c2185b; color: white; border: none; border-radius: 50%;
  width: 55px; height: 55px; font-size: 1.5em; cursor: pointer; z-index: 1000;
  box-shadow: 0 3px 8px rgba(0,0,0,0.3); transition: transform 0.15s;
}
#musicToggle:hover { transform: scale(1.1); }
</style>
</head>
<body>

<div id="bgFx"></div>

<div id="loadingScreen">
  <div class="loadingIcon">🧻</div>
  <h2>Tamponmania wird geladen...</h2>
  <div id="loadingBarOuter"><div id="loadingBarInner"></div></div>
  <p id="loadingText">0%</p>
</div>

<div id="critFlash"></div>
<div id="toast"></div>
<button id="musicToggle">🔇</button>

<div id="game">
<h1>🩸Tamponmania🩸</h1>
<div id="statBar">
  <div><span class="statLabel">Vorrat</span><div id="count">0</div></div>
  <div><span class="statLabel">Produktion</span><div id="cps">0 /Sek</div></div>
  <div><span class="statLabel">Combo</span><div id="comboBox">x1</div></div>
</div>

<div id="clickWrap">
  <div id="clickBtn" class="skin-classic">
    <div class="tampon-blood">🩸</div>
    <div class="tampon-body"></div>
    <div class="tampon-string"></div>
  </div>
</div>

<div class="shop" id="skinShop"><h2>🎨 Design-Upgrades</h2><p class="scrollHint">← zum Blättern seitlich wischen →</p><div id="skinItems" class="item-row"></div></div>
<div class="shop" id="shop"></div>
<div class="shop" id="specialShop"><h2>✨ Spezial-Upgrades ✨</h2><p class="scrollHint">← zum Blättern seitlich wischen →</p><div id="specialItems" class="item-row"></div></div>
</div>

<script>
/* ---------- background floaters ---------- */
(function () {
  const fx = document.getElementById('bgFx');
  const emojis = ['🩸','💖','🧻','✨','💗'];
  for (let i = 0; i < 16; i++) {
    const s = document.createElement('div');
    s.className = 'bgFloat';
    s.textContent = emojis[i % emojis.length];
    s.style.left = (Math.random() * 100) + '%';
    s.style.fontSize = (0.9 + Math.random() * 1.6) + 'em';
    s.style.animationDuration = (9 + Math.random() * 11) + 's';
    s.style.animationDelay = (-Math.random() * 15) + 's';
    fx.appendChild(s);
  }
})();

/* ---------- loading ---------- */
let progress = 0;
const loadInterval = setInterval(() => {
  progress += Math.random() * 15 + 5;
  if (progress >= 100) {
    progress = 100;
    clearInterval(loadInterval);
    setTimeout(() => {
      document.getElementById('loadingScreen').style.opacity = 0;
      setTimeout(() => {
        document.getElementById('loadingScreen').style.display = 'none';
        document.getElementById('game').style.display = 'block';
      }, 500);
    }, 300);
  }
  document.getElementById('loadingBarInner').style.width = progress + '%';
  document.getElementById('loadingText').textContent = Math.floor(progress) + '%';
}, 200);

/* ---------- game state ---------- */
let tampons = 0;
let cps = 0;
let critChance = 0;
let clickMultiplier = 1;
let critMultiplier = 10;
let passiveMultiplier = 1;

/* combo */
let combo = 1;
let comboTimer = null;

const upgrades = [
  { name: "Praktikantin", baseCost: 8, cps: 0.1, owned: 0, desc: "dreht Tampons von Hand" },
  { name: "Fabrikarbeiter", baseCost: 45, cps: 1, owned: 0, desc: "automatisiert die Produktion" },
  { name: "Verpackungsmaschine", baseCost: 220, cps: 5, owned: 0, desc: "verpackt im Akkord" },
  { name: "Fließband", baseCost: 1200, cps: 25, owned: 0, desc: "massenhaft Tampons" },
  { name: "Fabrik-Automatisierung", baseCost: 6000, cps: 100, owned: 0, desc: "vollautomatische Tampon-Fabrik" },
  { name: "KI-gesteuerte Anlage", baseCost: 30000, cps: 500, owned: 0, desc: "KI optimiert die Tampon-Produktion" },
  { name: "Regionale Zweigfabrik", baseCost: 150000, cps: 2500, owned: 0, desc: "eine ganze Tampon-Fabrik nur für dich" },
  { name: "Globales Vertriebsnetz", baseCost: 750000, cps: 12000, owned: 0, desc: "Tampons werden weltweit produziert" },
  { name: "Weltraum-Produktionsstation", baseCost: 3500000, cps: 60000, owned: 0, desc: "Schwerelose Tamponproduktion im Orbit" },
  { name: "Quantenfabrikator", baseCost: 18000000, cps: 300000, owned: 0, desc: "erschafft Tampons aus reiner Quantenenergie" },
  { name: "Zeitreise-Manufaktur", baseCost: 100000000, cps: 1500000, owned: 0, desc: "produziert Tampons aus Vergangenheit und Zukunft" },
  { name: "Paralleluniversum-Netzwerk", baseCost: 600000000, cps: 8000000, owned: 0, desc: "importiert Tampons aus Millionen Realitäten" },
  { name: "Schwarzes-Loch-Kompressor", baseCost: 4000000000, cps: 45000000, owned: 0, desc: "presst Tampons aus purer Raumzeit" },
  { name: "Galaktisches Tampon-Imperium", baseCost: 28000000000, cps: 250000000, owned: 0, desc: "beherrscht die Tamponproduktion der ganzen Galaxie" },
  { name: "Dimensionsportal-Fabrik", baseCost: 200000000000, cps: 1500000000, owned: 0, desc: "Tampons strömen aus tausend Portalen" },
  { name: "Multiversum-Konglomerat", baseCost: 1500000000000, cps: 9000000000, owned: 0, desc: "jedes Universum arbeitet nur für dich" },
  { name: "Göttliche Manifestation", baseCost: 10000000000000, cps: 55000000000, owned: 0, desc: "erschafft Tampons durch reinen Willen" },
  { name: "Urknall-Generator", baseCost: 80000000000000, cps: 350000000000, owned: 0, desc: "jeder Urknall gebiert unendlich neue Tampons" }
];

const specialUpgrades = [
  { id: "critical", name: "Critical Hit", cost: 1200, owned: false,
    desc: "10% Chance, dass jeder Tick (Klick oder passiv) 10x zählt",
    effect: () => { critChance += 0.10; } },
  { id: "kordon", name: "Kordon Mode", cost: 5000, owned: false,
    desc: "Klicks UND passive Produktion zählen doppelt, für immer",
    effect: () => { clickMultiplier *= 2; passiveMultiplier *= 2; } },
  { id: "supercrit", name: "Super Critical", cost: 25000, owned: false,
    desc: "Weitere 15% Krit-Chance, wirkt auch passiv",
    effect: () => { critChance += 0.15; } },
  { id: "goldenperiod", name: "Goldene Periode", cost: 70000, owned: false,
    desc: "Klick- und Passiv-Multiplikator werden erneut verdoppelt",
    effect: () => { clickMultiplier *= 2; passiveMultiplier *= 2; } },
  { id: "autoclicker", name: "67-Mode", cost: 10000, owned: false,
    desc: "Simuliert 67 automatische Klicks pro Sekunde",
    effect: () => { cps += 67 * clickMultiplier; } },
  { id: "megacrit", name: "Mega Critical", cost: 500000, owned: false,
    desc: "Kritische Treffer zählen jetzt 25x statt 10x, auch passiv",
    effect: () => { critMultiplier = 25; } },
  { id: "diddyparty", name: "Diddy Party", cost: 1000000, owned: false,
    desc: "Wilde Party-Boost: verdreifacht dauerhaft ALLE Produktionswerte (Klick + passiv)",
    effect: () => { clickMultiplier *= 3; passiveMultiplier *= 3; } },
  { id: "epsteinisland", name: "Epstein-Island", cost: 8000000, owned: false,
    desc: "Passive Produktion wird dauerhaft ver-5-facht",
    effect: () => { passiveMultiplier *= 5; } },
  { id: "goldenhands", name: "Goldene Hände", cost: 40000000, owned: false,
    desc: "Jeder Klick zählt dauerhaft 10x",
    effect: () => { clickMultiplier *= 10; } },
  { id: "omnicrit", name: "Omni-Kritisch", cost: 250000000, owned: false,
    desc: "Weitere 25% Krit-Chance auf ALLES",
    effect: () => { critChance += 0.25; } },
  { id: "bigbang", name: "Urknall-Boost", cost: 2000000000, owned: false,
    desc: "Verzehnfacht dauerhaft ALLE Produktionswerte (Klick + passiv)",
    effect: () => { clickMultiplier *= 10; passiveMultiplier *= 10; } },
  { id: "infinity", name: "Unendlichkeits-Modus", cost: 100000000000, owned: false,
    desc: "Kritische Treffer zählen jetzt gigantische 100x",
    effect: () => { critMultiplier = 100; } }
];

/* ---------- skins (design upgrades) ---------- */
const skins = [
  { id: "classic", name: "Klassik-Baumwolle", cls: "skin-classic", cost: 0,         owned: true,  preview: "linear-gradient(90deg,#d4c3ae,#fffcf5,#d4c3ae)", desc: "Das cremeweiße Original." },
  { id: "red",      name: "Rot-Edition 🩸",    cls: "skin-red",     cost: 5000,      owned: false, preview: "linear-gradient(90deg,#7a0000,#ff5252,#7a0000)", desc: "Die blutrote Extra-Stark-Version." },
  { id: "gold",     name: "Gold-Deluxe",       cls: "skin-gold",    cost: 250000,    owned: false, preview: "linear-gradient(90deg,#8a6d00,#ffd700,#8a6d00)", desc: "24-Karat für Luxus-Perioden." },
  { id: "neon",     name: "Neon-Rave",         cls: "skin-neon",    cost: 2500000,   owned: false, preview: "linear-gradient(90deg,#00332e,#39ff14,#00332e)", desc: "Leuchtet im Dunkeln der Disco." },
  { id: "diamond",  name: "Diamant-Eis",       cls: "skin-diamond", cost: 25000000,  owned: false, preview: "linear-gradient(115deg,#a8e6ff,#fff,#7fd4ff)", desc: "Kristallklar und eiskalt." },
  { id: "galaxy",   name: "Galaxie",           cls: "skin-galaxy",  cost: 400000000, owned: false, preview: "linear-gradient(120deg,#1a0033,#7b1fa2,#1a0033)", desc: "Ein Tampon aus dem Universum." },
  { id: "rainbow",  name: "Regenbogen 🌈",     cls: "skin-rainbow", cost: 10000000000,owned: false,preview: "linear-gradient(90deg,#ff004c,#ffe600,#00b0ff,#d500f9)", desc: "Der legendäre Alleskönner." }
];
let activeSkin = "classic";

/* ---------- elements ---------- */
const countEl = document.getElementById('count');
const cpsEl = document.getElementById('cps');
const comboEl = document.getElementById('comboBox');
const shopEl = document.getElementById('shop');
const specialItemsEl = document.getElementById('specialItems');
const skinItemsEl = document.getElementById('skinItems');
const clickBtn = document.getElementById('clickBtn');
const clickWrap = document.getElementById('clickWrap');
const critFlash = document.getElementById('critFlash');
const toastEl = document.getElementById('toast');

function cost(u) { return Math.floor(u.baseCost * Math.pow(1.15, u.owned)); }

function fmt(n) {
  n = Math.floor(n);
  if (n < 1000) return n.toString();
  const units = ["", "K", "Mio", "Mrd", "Bio", "Brd", "Trd", "Qua", "Qui"];
  let i = 0;
  while (n >= 1000 && i < units.length - 1) { n /= 1000; i++; }
  return n.toFixed(n < 10 ? 2 : n < 100 ? 1 : 0) + " " + units[i];
}

let shopBuilt = false, specialShopBuilt = false, skinShopBuilt = false;

function buildShop() {
  shopEl.innerHTML = '<h2>🏭 Produktions-Upgrades</h2><p class="scrollHint">← zum Blättern seitlich wischen →</p>';
  const wrap = document.createElement('div');
  wrap.className = 'item-row';
  upgrades.forEach((u, i) => {
    const div = document.createElement('div');
    div.className = 'item';
    div.innerHTML = `<strong>${u.name}</strong><br>${u.desc}<br>+${u.cps} pro Sekunde<br>
      <span class="ownedCount">Besitz: 0</span><br>
      <button class="buyBtn">Kaufen (0)</button>`;
    div.querySelector('.buyBtn').addEventListener('click', () => buy(i));
    wrap.appendChild(div);
  });
  shopEl.appendChild(wrap);
  shopBuilt = true;
}

function buildSpecialShop() {
  specialItemsEl.innerHTML = '';
  specialUpgrades.forEach(u => {
    const div = document.createElement('div');
    div.className = 'item special';
    div.innerHTML = `<strong>${u.name}</strong><br>${u.desc}<br><span class="specialStatus"></span>`;
    specialItemsEl.appendChild(div);
  });
  specialShopBuilt = true;
}

function buildSkinShop() {
  skinItemsEl.innerHTML = '';
  skins.forEach((s, i) => {
    const div = document.createElement('div');
    div.className = 'item skin';
    div.innerHTML = `<strong>${s.name}</strong>
      <div class="skinPreview" style="background:${s.preview};background-size:200% 100%;"></div>
      ${s.desc}<br><span class="skinStatus"></span>`;
    skinItemsEl.appendChild(div);
  });
  skinShopBuilt = true;
}

function renderShop() {
  if (!shopBuilt) buildShop();
  const items = shopEl.querySelectorAll('.item');
  upgrades.forEach((u, i) => {
    const c = cost(u);
    const div = items[i];
    div.querySelector('.ownedCount').textContent = `Besitz: ${u.owned}`;
    const btn = div.querySelector('.buyBtn');
    btn.textContent = `Kaufen (${fmt(c)})`;
    btn.disabled = tampons < c;
  });
}

function renderSpecialShop() {
  if (!specialShopBuilt) buildSpecialShop();
  const items = specialItemsEl.querySelectorAll('.item');
  specialUpgrades.forEach((u, i) => {
    const status = items[i].querySelector('.specialStatus');
    if (u.owned) {
      status.innerHTML = '<span class="owned-badge">✔ Gekauft</span>';
    } else {
      status.innerHTML = `<button class="buySpecialBtn">Kaufen (${fmt(u.cost)})</button>`;
      const btn = status.querySelector('.buySpecialBtn');
      btn.disabled = tampons < u.cost;
      btn.addEventListener('click', () => buySpecial(i));
    }
  });
}

function renderSkinShop() {
  if (!skinShopBuilt) buildSkinShop();
  const items = skinItemsEl.querySelectorAll('.item');
  skins.forEach((s, i) => {
    const div = items[i];
    div.classList.toggle('active', activeSkin === s.id);
    const status = div.querySelector('.skinStatus');
    if (activeSkin === s.id) {
      status.innerHTML = '<span class="active-badge">🩷 Aktiv</span>';
    } else if (s.owned) {
      status.innerHTML = '<button class="equipBtn">Anwenden</button>';
      status.querySelector('.equipBtn').addEventListener('click', () => equipSkin(i));
    } else {
      status.innerHTML = `<button class="buySkinBtn">Kaufen (${fmt(s.cost)})</button>`;
      const btn = status.querySelector('.buySkinBtn');
      btn.disabled = tampons < s.cost;
      btn.addEventListener('click', () => buySkin(i));
    }
  });
}

function equipSkin(i) {
  const s = skins[i];
  skins.forEach(k => clickBtn.classList.remove(k.cls));
  clickBtn.classList.add(s.cls);
  activeSkin = s.id;
  clickBtn.classList.remove('punch');
  void clickBtn.offsetWidth;
  clickBtn.classList.add('punch');
  renderSkinShop();
}

function buySkin(i) {
  const s = skins[i];
  if (!s.owned && tampons >= s.cost) {
    tampons -= s.cost;
    s.owned = true;
    equipSkin(i);
    toast(`🎨 ${s.name} freigeschaltet!`);
    update();
  }
}

function buy(i) {
  const u = upgrades[i];
  const c = cost(u);
  if (tampons >= c) { tampons -= c; u.owned++; cps += u.cps; update(); }
}

function buySpecial(i) {
  const u = specialUpgrades[i];
  if (!u.owned && tampons >= u.cost) {
    tampons -= u.cost; u.owned = true; u.effect();
    toast(`✨ ${u.name} aktiviert!`);
    update();
  }
}

function update() {
  countEl.textContent = fmt(tampons) + " 🩸";
  cpsEl.textContent = fmt(cps) + " /Sek";
  renderShop();
  renderSpecialShop();
  renderSkinShop();
}

/* ---------- visual effects ---------- */
function floatNumber(x, y, text, crit) {
  const el = document.createElement('div');
  el.className = 'floatNum' + (crit ? ' crit' : '');
  el.textContent = text;
  el.style.left = x + 'px';
  el.style.top = y + 'px';
  clickWrap.appendChild(el);
  setTimeout(() => el.remove(), 900);
}

function particles(x, y, crit) {
  const bits = crit ? ['🩸','💥','⭐','🩸','💫','🔥'] : ['🩸','💖','✨','💗'];
  const n = crit ? 10 : 6;
  for (let k = 0; k < n; k++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.textContent = bits[k % bits.length];
    const ang = (Math.PI * 2 * k) / n + Math.random();
    const dist = 40 + Math.random() * (crit ? 90 : 50);
    p.style.left = x + 'px';
    p.style.top = y + 'px';
    p.style.setProperty('--dx', Math.cos(ang) * dist + 'px');
    p.style.setProperty('--dy', Math.sin(ang) * dist + 'px');
    p.style.setProperty('--rot', (Math.random() * 720 - 360) + 'deg');
    clickWrap.appendChild(p);
    setTimeout(() => p.remove(), 700);
  }
}

function critEffect() {
  critFlash.classList.remove('on'); void critFlash.offsetWidth; critFlash.classList.add('on');
  document.body.classList.remove('shake'); void document.body.offsetWidth; document.body.classList.add('shake');
}

function bumpCombo() {
  combo = Math.min(combo + 1, 999);
  comboEl.textContent = 'x' + combo;
  comboEl.classList.remove('pop'); void comboEl.offsetWidth; comboEl.classList.add('pop');
  clearTimeout(comboTimer);
  comboTimer = setTimeout(() => { combo = 1; comboEl.textContent = 'x1'; }, 1500);
}

let toastTimer = null;
function toast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2200);
}

/* ---------- clicking ---------- */
clickBtn.addEventListener('click', (e) => {
  bumpCombo();
  const comboBonus = 1 + (combo - 1) * 0.05; // small reward for fast clicking
  let gain = 1 * clickMultiplier * comboBonus;
  let crit = false;
  if (Math.random() < critChance) { gain *= critMultiplier; crit = true; }
  tampons += gain;

  const rect = clickWrap.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  floatNumber(x, y, (crit ? 'KRIT! +' : '+') + fmt(gain), crit);
  particles(x, y, crit);
  clickBtn.classList.remove('punch'); void clickBtn.offsetWidth; clickBtn.classList.add('punch');
  if (crit) critEffect();
  update();
});

/* ---------- passive production ---------- */
setInterval(() => {
  let passiveGain = (cps / 10) * passiveMultiplier;
  if (Math.random() < critChance) { passiveGain *= critMultiplier; }
  tampons += passiveGain;
  update();
}, 100);

/* ---------- milestones ---------- */
const milestones = [100, 1000, 10000, 100000, 1000000, 10000000, 100000000, 1000000000,
  10000000000, 100000000000, 1000000000000, 100000000000000];
let msIndex = 0;
setInterval(() => {
  if (msIndex < milestones.length && tampons >= milestones[msIndex]) {
    toast(`🏆 ${fmt(milestones[msIndex])} Tampons erreicht!`);
    msIndex++;
  }
}, 500);

update();

/* ---------- chiptune music (unchanged engine) ---------- */
let audioCtx = null, musicPlaying = false, musicIntervals = [];

function startMusic() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  // mobile browsers (iOS/Safari, Chrome Android) start suspended: resume on the gesture
  if (audioCtx.state === 'suspended') audioCtx.resume();

  // --- master chain with a gentle lowpass so it never gets harsh ---
  const master = audioCtx.createGain();
  master.gain.value = 0.45;
  const masterFilter = audioCtx.createBiquadFilter();
  masterFilter.type = 'lowpass';
  masterFilter.frequency.value = 6500;
  master.connect(masterFilter);
  masterFilter.connect(audioCtx.destination);

  // --- ping-pong-ish echo send for the lead ---
  const delay = audioCtx.createDelay();
  delay.delayTime.value = 0.26;
  const feedback = audioCtx.createGain();
  feedback.gain.value = 0.3;
  const echoOut = audioCtx.createGain();
  echoOut.gain.value = 0.5;
  delay.connect(feedback); feedback.connect(delay);
  delay.connect(echoOut); echoOut.connect(master);

  function tone(freq, type, start, dur, vol, echo) {
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = type; osc.frequency.value = freq;
    g.gain.setValueAtTime(0.0001, start);
    g.gain.exponentialRampToValueAtTime(vol, start + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, start + dur);
    osc.connect(g); g.connect(master);
    if (echo) g.connect(delay);
    osc.start(start); osc.stop(start + dur + 0.05);
  }

  function kick(start) {
    const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
    osc.frequency.setValueAtTime(150, start);
    osc.frequency.exponentialRampToValueAtTime(45, start + 0.12);
    g.gain.setValueAtTime(0.9, start);
    g.gain.exponentialRampToValueAtTime(0.0001, start + 0.18);
    osc.connect(g); g.connect(master);
    osc.start(start); osc.stop(start + 0.2);
  }

  function noiseHit(start, dur, filterType, filterFreq, vol) {
    const size = Math.floor(audioCtx.sampleRate * dur);
    const buffer = audioCtx.createBuffer(1, size, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let j = 0; j < size; j++) data[j] = Math.random() * 2 - 1;
    const src = audioCtx.createBufferSource(); src.buffer = buffer;
    const filt = audioCtx.createBiquadFilter(); filt.type = filterType; filt.frequency.value = filterFreq;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(vol, start);
    g.gain.exponentialRampToValueAtTime(0.0001, start + dur);
    src.connect(filt); filt.connect(g); g.connect(master);
    src.start(start); src.stop(start + dur);
  }
  const hat   = (start, open) => noiseHit(start, open ? 0.09 : 0.03, 'highpass', 8000, open ? 0.12 : 0.07);
  const snare = (start) => { noiseHit(start, 0.16, 'bandpass', 1800, 0.4); };

  // --- chord progression: Am – F – C – G (uplifting, catchy) ---
  const chords = [
    { bass: 110.00, notes: [220.00, 261.63, 329.63] }, // Am
    { bass: 174.61, notes: [174.61, 220.00, 261.63] }, // F
    { bass: 130.81, notes: [261.63, 329.63, 392.00] }, // C
    { bass: 196.00, notes: [196.00, 246.94, 293.66] }  // G
  ];
  // 32-step lead melody (16th notes over 4 bars), 0 = rest
  const lead = [
    659.25, 0, 587.33, 0, 523.25, 0, 587.33, 659.25,
    523.25, 0, 0, 440.00, 493.88, 0, 523.25, 0,
    698.46, 0, 659.25, 0, 587.33, 0, 523.25, 0,
    587.33, 0, 493.88, 0, 440.00, 0, 392.00, 0
  ];

  const stepDur = 60 / 128 / 4; // 16th notes at 128 BPM
  let step = 0;
  let nextTime = audioCtx.currentTime + 0.08;

  function scheduler() {
    while (nextTime < audioCtx.currentTime + 0.18) {
      const s = step % 32;
      const chord = chords[Math.floor(s / 8) % 4];
      if (s % 4 === 0) tone(chord.bass, 'triangle', nextTime, 0.34, 0.34);      // bassline
      tone(chord.notes[step % 3] * 2, 'square', nextTime, 0.11, 0.045);          // arp shimmer
      if (lead[s]) tone(lead[s], 'sawtooth', nextTime, 0.24, 0.085, true);       // lead + echo
      if (s % 4 === 0) kick(nextTime);                                           // four-on-the-floor
      if (s % 8 === 4) snare(nextTime);                                          // backbeat
      hat(nextTime, s % 4 === 2);                                                // hats, open off-beat
      step++;
      nextTime += stepDur;
    }
  }

  scheduler();
  musicIntervals.push(setInterval(scheduler, 40));
  musicPlaying = true;
}

function stopMusic() {
  musicIntervals.forEach(iv => clearInterval(iv));
  musicIntervals = [];
  if (audioCtx) audioCtx.suspend();
  musicPlaying = false;
}

document.getElementById('musicToggle').addEventListener('click', () => {
  const btn = document.getElementById('musicToggle');
  if (musicPlaying) { stopMusic(); btn.textContent = '🔇'; }
  else { startMusic(); btn.textContent = '🔊'; }
});
</script>
